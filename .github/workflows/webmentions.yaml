name: Refresh webmentions

on:
  schedule:
    # Public repo → Actions are free and a run is ~10s, so poll often. GitHub
    # schedules are best-effort (5-min crons can be delayed/skipped under load).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Least privilege: push the data files (contents) and dispatch the deploy (actions).
permissions:
  contents: write
  actions: write

# A late refresh is pointless once a newer one starts.
concurrency:
  group: refresh-webmentions
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Sparse-checkout only the caches and the updaters
        uses: actions/checkout@v7
        with:
          # NON-CONE: cone mode silently checks out the whole repo when given a
          # file path (actions/checkout#1550). Non-cone treats these as
          # gitignore-style patterns and fetches exactly these files.
          sparse-checkout: |
            src/data/webmentions.json
            src/data/bluesky-posts.json
            .github/scripts/update-webmentions.mjs
            .github/scripts/update-bluesky-links.mjs
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      # Node 22 is the ubuntu-latest default and has native fetch — no setup-node,
      # no npm install, no node_modules. Each updater is its own dependency-free app
      # and only writes its file when something actually changed.
      - name: Refresh webmention cache
        env:
          WEBMENTION_DOMAIN: www.crumpledpaper.tech
          WEBMENTION_TOKEN: ${{ secrets.WEBMENTION_IO_TOKEN }}
          WEBMENTION_CACHE: src/data/webmentions.json
        run: node .github/scripts/update-webmentions.mjs

      # No token needed — reads the bridged account's public AT-Proto repo.
      - name: Refresh Bluesky thread links
        env:
          BLUESKY_HANDLE: crumpledpaper.tech
          BLUESKY_LINKS_CACHE: src/data/bluesky-posts.json
        run: node .github/scripts/update-bluesky-links.mjs

      - name: Commit, push, and trigger a rebuild
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "webmentions-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/webmentions.json src/data/bluesky-posts.json
          # Commit only if a refresh actually changed something.
          if git diff --cached --quiet; then
            echo "No data changes; nothing to deploy."
            exit 0
          fi
          git commit -m "data: refresh webmentions + bluesky links [bot]"
          git push origin HEAD:main
          # A push made with GITHUB_TOKEN does NOT trigger deploy.yaml's push event
          # (GitHub's no-recursion rule), so dispatch the build explicitly. The
          # dispatched run checks out main@tip — including the commit above.
          gh workflow run deploy.yaml --ref main
