name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # with:
        # path: . # The root location of your Astro project inside the repository. (optional)
        # node-version: 20 # The specific version of Node that should be used to build your site. Defaults to 20. (optional)
        # package-manager: pnpm@latest # The Node package manager that should be used to install dependencies and build your site. Automatically detected based on your lockfile. (optional)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Webmention-mode: prompt Bridgy Fed to federate each published post right after
  # deploy, instead of waiting on its (slow) feed-poll cadence.
  federate:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Ping Bridgy Fed for each post
        run: |
          set -uo pipefail

          feed=$(curl -fsS https://www.crumpledpaper.tech/rss.xml) || {
            echo "::error title=Federation::could not fetch rss.xml"; exit 1; }

          # Bridgy Fed derives the bridged user from the source URL's domain, and
          # this site is registered under the APEX domain (crumpledpaper.tech), not
          # the canonical www host. Rewrite www -> apex or Bridgy rejects with
          # "400 No user found for domain www.crumpledpaper.tech".
          urls=$(printf '%s' "$feed" \
            | grep -oE '<link>https://www\.crumpledpaper\.tech/[^<]+</link>' \
            | sed -E 's,</?link>,,g' \
            | grep -vE '/(rss|atom)\.xml$' \
            | sed -E 's,^https://www\.,https://,')

          {
            echo "### Bridgy Fed federation"
            echo ""
            echo "| status | code | post |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          total=0; ok=0; fail=0
          while read -r src; do
            [ -n "$src" ] || continue
            total=$((total + 1))
            resp=$(curl -sS -X POST https://fed.brid.gy/webmention \
              --data-urlencode "source=$src" \
              --data-urlencode "target=https://fed.brid.gy/" \
              -w $'\n%{http_code}')
            code=${resp##*$'\n'}
            body=${resp%$'\n'*}
            case "$code" in
              200 | 201 | 202)
                ok=$((ok + 1)); icon="✅"
                echo "::group::$icon $code  $src"
                echo "$body"
                echo "::endgroup::"
                ;;
              *)
                fail=$((fail + 1)); icon="❌"
                echo "::group::$icon $code  $src"
                echo "$body"
                echo "::endgroup::"
                echo "::error title=Federation failed ($code)::$src — $body"
                ;;
            esac
            echo "| $icon | $code | $src |" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$urls"

          echo ""
          echo "Federated $ok/$total post(s); $fail failed."
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Federated $ok/$total post(s); $fail failed.**" >> "$GITHUB_STEP_SUMMARY"

          # Mark the job red if any post failed so the deploy run surfaces it,
          # without affecting the already-succeeded deploy job.
          [ "$fail" -eq 0 ]
